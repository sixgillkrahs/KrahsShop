spring:
  data:
    mongodb:
      uri: mongodb://localhost:2718/product-service

  application:
    name: PRODUCT-SERVICE


server:
  port: 5004

eureka:
  client:
    registerWithEureka: true
    fetchRegistry: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost
logging:
  pattern:
    level: '%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]'


